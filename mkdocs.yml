site_name: GDS Ecosystem
site_description: Typed compositional specifications for complex systems — framework, visualization, games, and examples
site_url: https://blockscience.github.io/gds-core
repo_url: https://github.com/BlockScience/gds-core
repo_name: BlockScience/gds-core

theme:
  name: material
  palette:
    - scheme: default
      primary: indigo
      accent: teal
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: teal
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - content.code.copy
    - navigation.tabs
    - navigation.sections
    - navigation.indexes
    - navigation.instant
    - navigation.top
    - toc.follow

plugins:
  - search
  - marimo
  - mkdocstrings:
      handlers:
        python:
          options:
            show_source: true
            show_bases: true
            members_order: source
            docstring_style: google
  - llmstxt:
      markdown_description: |
        GDS (Generalized Dynamical Systems) is a typed compositional specification
        framework for complex systems. It provides a composition algebra (stack,
        parallel, feedback, loop), a 3-stage compiler to flat IR, and a verification
        engine. Five domain DSLs (games, control, stock-flow, software, business)
        compile to the same GDS IR, validating it as a universal transition calculus.
      full_output: llms-full.txt
      sections:
        Framework (gds-framework):
          - {index.md: "Monorepo landing page — package overview, install, architecture"}
          - {framework/index.md: "Core engine — blocks, composition algebra, compiler, verification"}
          - {framework/quick-reference.md: "Cheat sheet for types, blocks, composition, and verification"}
          - {framework/getting-started/install.md: "Installation for users and developers"}
          - {framework/getting-started/quickstart.md: "Build a thermostat spec in 5 minutes"}
          - framework/guide/*.md
          - framework/api/*.md
        Visualization (gds-viz):
          - {viz/index.md: "Mermaid diagram renderers for GDS specifications"}
          - {viz/getting-started.md: "First diagram in 3 lines of code"}
          - viz/guide/*.md
          - viz/api/*.md
        Games (gds-games / ogs):
          - {games/index.md: "Typed DSL for compositional game theory (Open Games)"}
          - {games/getting-started.md: "Model a Prisoner's Dilemma game"}
          - {games/equilibrium.md: "Nash equilibrium computation via Nashpy"}
          - games/guide/*.md
          - games/design/*.md
          - games/api/*.md
        Business (gds-business):
          - {business/index.md: "Business dynamics DSL — CLD, supply chain, value stream map"}
          - {business/getting-started.md: "Model a causal loop diagram"}
          - business/guide/*.md
          - business/api/*.md
        Stock-Flow (gds-stockflow):
          - {stockflow/index.md: "Declarative stock-flow DSL over GDS semantics"}
          - {stockflow/getting-started.md: "Model an SIR epidemic as stocks and flows"}
          - stockflow/guide/*.md
          - stockflow/api/*.md
        Control (gds-control):
          - {control/index.md: "State-space control systems DSL over GDS semantics"}
          - {control/getting-started.md: "Model a PID thermostat controller"}
          - control/guide/*.md
          - control/api/*.md
        Software (gds-software):
          - {software/index.md: "Software architecture DSL — DFD, state machine, C4, ERD, component, dependency"}
          - {software/getting-started.md: "Model a data flow diagram"}
          - software/guide/*.md
          - software/api/*.md
        Examples:
          - {examples/index.md: "Six tutorial models demonstrating every framework feature"}
          - {examples/learning-path.md: "Recommended order for working through examples"}
          - examples/building-models.md
          - examples/feature-matrix.md
          - examples/examples/*.md
        Tutorials:
          - tutorials/*.md
        Guides:
          - {guides/getting-started.md: "Build a thermostat model in 5 progressive stages"}
          - {guides/choosing-a-dsl.md: "Decision guide for picking the right DSL"}
          - {guides/best-practices.md: "Patterns and anti-patterns for GDS modeling"}
          - {guides/rosetta-stone.md: "Same problem modeled with stockflow, control, and games"}
          - {guides/verification.md: "All 3 verification layers with deliberately broken models"}
          - {guides/visualization.md: "6 view types, 5 themes, cross-DSL rendering"}
          - guides/real-world-patterns.md
          - guides/troubleshooting.md
          - guides/interoperability.md
          - guides/architecture-milestone-layer0.md
          - guides/dsl-roadmap.md
          - research/research-boundaries.md
          - guides/view-stratification.md
        OWL (gds-owl):
          - {owl/index.md: "OWL/SHACL/SPARQL for GDS specifications — semantic web interoperability"}
          - {owl/getting-started.md: "Export a spec to Turtle, import back, validate with SHACL"}
          - owl/guide/*.md
          - owl/api/*.md
        PSUU (gds-psuu):
          - {psuu/index.md: "Parameter space search under uncertainty for gds-sim"}
          - {psuu/getting-started.md: "Installation + first parameter sweep"}
          - psuu/guide/*.md
          - psuu/api/*.md
        Continuous-Time (gds-continuous):
          - {continuous/index.md: "Continuous-time ODE integration engine — 6 SciPy solvers"}
          - {continuous/getting-started.md: "Define and simulate an ODE system"}
        Symbolic Math (gds-symbolic):
          - {symbolic/index.md: "SymPy bridge for gds-control — symbolic equations and linearization"}
          - {symbolic/getting-started.md: "Compile symbolic equations to ODE functions"}
        Analysis (gds-analysis):
          - {analysis/index.md: "Bridge GDSSpec structural annotations to gds-sim runtime"}
          - {analysis/getting-started.md: "Convert a GDSSpec to a runnable simulation model"}
        Case Studies:
          - {case-studies/index.md: "Real-world projects built on the GDS ecosystem"}
          - {case-studies/axelrod.md: "Axelrod tournament — one model, many views with gds-games, gds-sim, gds-psuu, gds-viz"}
        Ecosystem:
          - {framework/ecosystem.md: "All packages, their imports, and dependency relationships"}

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - toc:
      permalink: true
  - attr_list
  - md_in_html

